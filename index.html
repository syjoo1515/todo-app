<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TODO</title>
  <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Noto+Sans+KR:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 인증 섹션 (로그인/회원가입) -->
  <div id="authSection" class="auth-card">
    <div class="card-header">
      <span class="header-deco">🌸</span>
      <h1>TODO List</h1>
      <span class="header-deco">🌸</span>
    </div>
    <div class="card-body">
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">로그인</button>
        <button class="auth-tab" data-tab="signup">회원가입</button>
      </div>
      <div id="loginForm" class="auth-form">
        <input type="email" id="loginEmail" placeholder="이메일" />
        <input type="password" id="loginPassword" placeholder="비밀번호" />
        <button id="loginBtn">로그인</button>
      </div>
      <div id="signupForm" class="auth-form hidden">
        <input type="email" id="signupEmail" placeholder="이메일" />
        <input type="password" id="signupPassword" placeholder="비밀번호 (6자 이상)" />
        <input type="password" id="signupPasswordConfirm" placeholder="비밀번호 확인" />
        <button id="signupBtn">회원가입</button>
      </div>
      <p id="authMessage" class="auth-message"></p>
    </div>
  </div>

  <!-- TODO 섹션 (로그인 후) -->
  <div id="todoSection" class="card hidden">
    <div class="card-header">
      <span class="header-deco">🌸</span>
      <h1>TODO List</h1>
      <span class="header-deco">🌸</span>
      <div class="user-info">
        <span id="userEmail"></span>
        <button id="logoutBtn">로그아웃</button>
      </div>
    </div>
    <div class="card-body">
      <div class="input-area">
        <input type="text" id="todoInput" placeholder="할 일을 입력하세요 ✏️" />
        <button id="addBtn">+ 추가</button>
      </div>
      <ul id="todoList"></ul>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="script.js"></script>
</body>
</html>
