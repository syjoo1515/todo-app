<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TODO</title>
  <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Noto+Sans+KR:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 인증 섹션 (로그인/회원가입) -->
  <div id="authSection" class="auth-card">
    <div class="card-header">
      <span class="header-deco">🌸</span>
      <h1>TODO List</h1>
      <span class="header-deco">🌸</span>
    </div>
    <div class="card-body">
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">로그인</button>
        <button class="auth-tab" data-tab="signup">회원가입</button>
      </div>
      <div id="loginForm" class="auth-form">
        <input type="email" id="loginEmail" placeholder="이메일" />
        <input type="password" id="loginPassword" placeholder="비밀번호" />
        <button id="loginBtn">로그인</button>
      </div>
      <div id="signupForm" class="auth-form hidden">
        <input type="email" id="signupEmail" placeholder="이메일" />
        <input type="password" id="signupPassword" placeholder="비밀번호 (6자 이상)" />
        <input type="password" id="signupPasswordConfirm" placeholder="비밀번호 확인" />
        <button id="signupBtn">회원가입</button>
      </div>
      <div class="social-divider"><span>또는</span></div>
      <div class="social-buttons">
        <button id="googleLoginBtn" class="social-btn google-btn">
          <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" />
          Google로 계속
        </button>
        <button id="githubLoginBtn" class="social-btn github-btn">
          <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61-.546-1.385-1.335-1.755-1.335-1.755-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 21.795 24 17.295 24 12c0-6.63-5.37-12-12-12z"/>
          </svg>
          GitHub로 계속
        </button>
      </div>
      <p id="authMessage" class="auth-message"></p>
    </div>
  </div>

  <!-- TODO 섹션 (로그인 후) -->
  <div id="todoSection" class="card hidden">
    <div class="card-header">
      <span class="header-deco">🌸</span>
      <h1>TODO List</h1>
      <span class="header-deco">🌸</span>
      <div class="user-info">
        <span id="userEmail"></span>
        <button id="logoutBtn">로그아웃</button>
      </div>
    </div>
    <div class="card-body">
      <div class="input-area">
        <input type="text" id="todoInput" placeholder="할 일을 입력하세요 ✏️" />
        <button id="addBtn">+ 추가</button>
      </div>
      <ul id="todoList"></ul>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="script.js"></script>
</body>
</html>
